# Heltec WiFi LoRa 32 V3 (ESP32-S3) + ESP-Prog-2 (FTDI) external JTAG
# JTAG pins on the board are GPIO39-42 (MTCK/MTDO/MTDI/MTMS). See Heltec pin map.

source [find interface/esp_usb_bridge.cfg]

# ESP32-S3 uses JTAG (not SWD)
transport select jtag

# Start conservative; increase if stable.
# (Try 20000, then 40000 if your wiring is short/clean.)
adapter speed 20000

# If you wired SRST from the probe to EN/CHIP_PU and it behaves well, you can try:
# reset_config srst_only srst_push_pull
# Otherwise, leave reset alone:
reset_config none

# Target definition
source [find target/esp32s3.cfg]